<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucid Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        input:focus, button:focus {
            outline: none;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="w-screen h-screen m-0 p-0 overflow-x-hidden flex flex-col">

    <div id="login-view" class="fixed inset-0 z-50 bg-black flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="w-full max-w-sm px-6 flex flex-col items-center">
            <h1 class="text-3xl font-bold tracking-widest mb-2">LUCID ADMIN</h1>
            <p class="text-gray-500 text-sm mb-10 text-center">System Management</p>
            
            <button id="login-btn" class="w-full flex items-center justify-center gap-3 bg-white text-black px-6 py-4 rounded-xl font-bold active:scale-[0.98] transition-transform">
                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                </svg>
                Sign In
            </button>
            <div id="login-error" class="mt-5 text-red-500 text-sm font-medium hidden">Unauthorized Access</div>
        </div>
    </div>

    <div id="dashboard-view" class="hidden flex-col w-full h-full bg-[#0a0a0a]">
        <header class="w-full bg-[#141414] border-b border-[#262626] px-6 py-4 flex justify-between items-center shrink-0">
            <h1 class="text-lg font-bold tracking-widest text-white">LUCID</h1>
            <div class="flex items-center gap-4">
                <span id="admin-email" class="text-xs font-medium text-gray-400 hidden sm:block"></span>
                <button id="logout-btn" class="text-xs font-bold text-red-400 bg-red-400/10 px-4 py-2 rounded-lg hover:bg-red-400/20 transition-colors">Sign Out</button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto hide-scrollbar p-6">
            <div class="max-w-6xl mx-auto">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
                    <div>
                        <h2 class="text-2xl font-bold text-white mb-1">Licenses</h2>
                        <p class="text-sm text-gray-500">Manage application access and user assignments</p>
                    </div>
                    <button id="generate-btn" class="bg-white text-black px-5 py-2.5 rounded-lg font-bold text-sm flex items-center gap-2 active:scale-95 transition-transform shrink-0">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Generate Code
                    </button>
                </div>

                <div class="w-full mb-6 relative">
                    <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search-input" placeholder="Search license or email..." class="w-full bg-[#141414] border border-[#262626] rounded-xl py-3 pl-11 pr-4 text-sm text-white placeholder-gray-600 focus:border-white transition-colors">
                </div>

                <div class="bg-[#141414] border border-[#262626] rounded-xl overflow-hidden w-full">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm whitespace-nowrap">
                            <thead>
                                <tr class="bg-[#0a0a0a] border-b border-[#262626] text-gray-400">
                                    <th class="px-6 py-4 font-semibold">License Code</th>
                                    <th class="px-6 py-4 font-semibold">Assigned User</th>
                                    <th class="px-6 py-4 font-semibold">Status</th>
                                    <th class="px-6 py-4 font-semibold text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="license-table-body" class="divide-y divide-[#262626]">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="email-modal" class="fixed inset-0 z-[100] bg-black/80 hidden items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-[#141414] border border-[#262626] w-full max-w-md rounded-2xl p-6 transform scale-95 transition-transform duration-300" id="email-modal-content">
            <h3 class="text-lg font-bold text-white mb-2">Assign User</h3>
            <p class="text-sm text-gray-500 mb-6">Link this license to a specific email address.</p>
            
            <input type="email" id="assign-email-input" placeholder="user@domain.com" class="w-full bg-[#0a0a0a] border border-[#262626] rounded-xl py-3 px-4 text-sm text-white focus:border-white transition-colors mb-6">
            
            <div class="flex gap-3">
                <button id="cancel-assign-btn" class="flex-1 bg-transparent border border-[#262626] text-white py-3 rounded-xl font-bold text-sm hover:bg-[#262626] transition-colors">Cancel</button>
                <button id="save-assign-btn" class="flex-1 bg-white text-black py-3 rounded-xl font-bold text-sm hover:bg-gray-200 transition-colors">Save</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-0oRlqQ7odJJYXIyaQX_MlAUNcJKk0WU",
            authDomain: "lucidbyheri.firebaseapp.com",
            projectId: "lucidbyheri",
            storageBucket: "lucidbyheri.firebasestorage.app",
            messagingSenderId: "282347124526",
            appId: "1:282347124526:web:552c724fae9fc433912cbf"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const allowedAdmins = ["herisanjaya14@gmail.com", "ighsforyou@gmail.com"];

        const loginView = document.getElementById('login-view');
        const dashboardView = document.getElementById('dashboard-view');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const loginError = document.getElementById('login-error');
        const adminEmailTxt = document.getElementById('admin-email');
        const generateBtn = document.getElementById('generate-btn');
        const searchInput = document.getElementById('search-input');
        const tableBody = document.getElementById('license-table-body');
        
        const emailModal = document.getElementById('email-modal');
        const emailModalContent = document.getElementById('email-modal-content');
        const assignEmailInput = document.getElementById('assign-email-input');
        const cancelAssignBtn = document.getElementById('cancel-assign-btn');
        const saveAssignBtn = document.getElementById('save-assign-btn');

        let allLicenses = [];
        let currentEditingId = null;

        onAuthStateChanged(auth, (user) => {
            if (user && allowedAdmins.includes(user.email)) {
                loginError.classList.add('hidden');
                adminEmailTxt.textContent = user.email;
                loginView.style.opacity = '0';
                setTimeout(() => {
                    loginView.classList.add('hidden');
                    loginView.classList.remove('flex');
                    dashboardView.classList.remove('hidden');
                    dashboardView.classList.add('flex');
                    loadData();
                }, 300);
            } else if (user) {
                signOut(auth);
                loginError.textContent = "You do not have administrative privileges.";
                loginError.classList.remove('hidden');
            } else {
                dashboardView.classList.add('hidden');
                dashboardView.classList.remove('flex');
                loginView.classList.remove('hidden');
                loginView.classList.add('flex');
                setTimeout(() => {
                    loginView.style.opacity = '1';
                }, 10);
            }
        });

        loginBtn.addEventListener('click', () => {
            loginError.classList.add('hidden');
            signInWithPopup(auth, provider).catch(() => {
                loginError.textContent = "Authentication failed.";
                loginError.classList.remove('hidden');
            });
        });

        logoutBtn.addEventListener('click', () => {
            signOut(auth);
        });

        function loadData() {
            onSnapshot(collection(db, "licenses"), (snapshot) => {
                allLicenses = [];
                snapshot.forEach((doc) => {
                    allLicenses.push({ id: doc.id, ...doc.data() });
                });
                
                allLicenses.sort((a, b) => {
                    const timeA = a.createdAt ? a.createdAt.toMillis() : 0;
                    const timeB = b.createdAt ? b.createdAt.toMillis() : 0;
                    return timeB - timeA;
                });
                
                renderTable();
            });
        }

        function renderTable() {
            const query = searchInput.value.toLowerCase();
            const filtered = allLicenses.filter(item => 
                item.id.toLowerCase().includes(query) || 
                (item.email && item.email.toLowerCase().includes(query))
            );

            tableBody.innerHTML = '';

            if (filtered.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="4" class="px-6 py-12 text-center text-gray-500">
                            No licenses found.
                        </td>
                    </tr>
                `;
                return;
            }

            filtered.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-[#1a1a1a] transition-colors group";
                
                const emailDisplay = item.email ? 
                    `<span class="text-white">${item.email}</span>` : 
                    `<span class="text-gray-600 italic">Unassigned</span>`;

                const statusColor = item.status === 'active' ? 'text-green-400 bg-green-400/10 border-green-400/20' : 'text-red-400 bg-red-400/10 border-red-400/20';
                const statusText = item.status === 'active' ? 'Active' : 'Blocked';
                
                tr.innerHTML = `
                    <td class="px-6 py-4">
                        <span class="font-mono text-white tracking-wider">${item.id}</span>
                    </td>
                    <td class="px-6 py-4 cursor-pointer" onclick="window.openEmailModal('${item.id}', '${item.email || ''}')">
                        <div class="flex items-center gap-2">
                            ${emailDisplay}
                            <svg class="w-3.5 h-3.5 text-gray-600 group-hover:text-white transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <button onclick="window.toggleStatus('${item.id}', '${item.status}')" class="px-3 py-1 rounded-full text-xs font-bold border ${statusColor} active:scale-95 transition-all">
                            ${statusText}
                        </button>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="window.deleteLicense('${item.id}')" class="text-gray-500 hover:text-red-400 p-2 rounded-lg hover:bg-red-400/10 transition-colors">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        searchInput.addEventListener('input', renderTable);

        generateBtn.addEventListener('click', async () => {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for(let i=0; i<12; i++) {
                if(i>0 && i%4===0) code += '-';
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            try {
                await setDoc(doc(db, "licenses", code), {
                    email: "",
                    status: "active",
                    createdAt: serverTimestamp()
                });
            } catch (e) {}
        });

        window.toggleStatus = async (id, currentStatus) => {
            const newStatus = currentStatus === 'active' ? 'blocked' : 'active';
            try {
                await updateDoc(doc(db, "licenses", id), {
                    status: newStatus
                });
            } catch (e) {}
        };

        window.deleteLicense = async (id) => {
            if (confirm(`Remove license ${id} permanently?`)) {
                try {
                    await deleteDoc(doc(db, "licenses", id));
                } catch (e) {}
            }
        };

        window.openEmailModal = (id, currentEmail) => {
            currentEditingId = id;
            assignEmailInput.value = currentEmail;
            emailModal.classList.remove('hidden');
            emailModal.classList.add('flex');
            setTimeout(() => {
                emailModal.classList.remove('opacity-0');
                emailModalContent.classList.remove('scale-95');
                emailModalContent.classList.add('scale-100');
            }, 10);
        };

        function closeEmailModal() {
            emailModal.classList.add('opacity-0');
            emailModalContent.classList.remove('scale-100');
            emailModalContent.classList.add('scale-95');
            setTimeout(() => {
                emailModal.classList.add('hidden');
                emailModal.classList.remove('flex');
                currentEditingId = null;
            }, 300);
        }

        cancelAssignBtn.addEventListener('click', closeEmailModal);

        saveAssignBtn.addEventListener('click', async () => {
            if (!currentEditingId) return;
            const newEmail = assignEmailInput.value.trim();
            
            try {
                await updateDoc(doc(db, "licenses", currentEditingId), {
                    email: newEmail
                });
                closeEmailModal();
            } catch (e) {}
        });
    </script>
</body>
</html>
