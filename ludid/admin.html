<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Lucid Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        input:focus, button:focus {
            outline: none;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="w-screen h-screen m-0 p-0 overflow-x-hidden flex flex-col bg-black">

    <div id="login-view" class="fixed inset-0 z-50 bg-black flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="w-full max-w-sm px-6 flex flex-col items-center">
            <h1 class="text-3xl font-bold tracking-widest mb-2">LUCID ADMIN</h1>
            <p class="text-gray-500 text-sm mb-10 text-center">System Management</p>
            
            <input type="email" id="email-input" placeholder="Admin Email" class="w-full bg-[#141414] border border-[#262626] rounded-xl py-3 px-4 text-sm text-white focus:border-white transition-colors mb-3">
            <input type="password" id="password-input" placeholder="Password" class="w-full bg-[#141414] border border-[#262626] rounded-xl py-3 px-4 text-sm text-white focus:border-white transition-colors mb-6">
            
            <button id="login-btn" class="w-full flex items-center justify-center gap-2 bg-white text-black px-6 py-3.5 rounded-xl font-bold active:scale-[0.98] transition-transform">
                Sign In
            </button>
            <div id="login-error" class="mt-4 text-red-500 text-sm font-medium hidden"></div>
        </div>
    </div>

    <div id="dashboard-view" class="hidden flex-col w-full h-full bg-[#0a0a0a]">
        <header class="w-full bg-[#141414] border-b border-[#262626] px-6 py-4 flex justify-between items-center shrink-0">
            <h1 class="text-lg font-bold tracking-widest text-white">LUCID ADMIN</h1>
            <button id="logout-btn" class="text-xs font-bold text-red-400 bg-red-400/10 px-4 py-2 rounded-lg hover:bg-red-400/20 transition-colors">Sign Out</button>
        </header>

        <div class="flex-1 overflow-y-auto hide-scrollbar p-0 sm:p-6">
            <div class="max-w-3xl mx-auto w-full">
                
                <div class="p-6 pb-2">
                    <div class="flex flex-row justify-between items-center gap-4 mb-6">
                        <div>
                            <h2 class="text-xl font-bold text-white mb-1">Licenses</h2>
                            <p class="text-xs text-gray-500">Manage application access</p>
                        </div>
                        <button id="generate-btn" class="bg-white text-black px-4 py-2.5 rounded-lg font-bold text-xs flex items-center gap-2 active:scale-95 transition-transform shrink-0">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            Generate
                        </button>
                    </div>

                    <div class="w-full relative mb-4">
                        <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" id="search-input" placeholder="Search code or name..." class="w-full bg-[#141414] border border-[#262626] rounded-xl py-3 pl-11 pr-4 text-sm text-white placeholder-gray-600 focus:border-white transition-colors">
                    </div>
                </div>

                <div class="bg-[#141414] sm:border border-[#262626] sm:rounded-xl overflow-hidden w-full">
                    <div id="license-list-container" class="flex flex-col divide-y divide-[#262626]">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('lucid_admin_auth') === 'true') {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('dashboard-view').classList.add('flex');
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-0oRlqQ7odJJYXIyaQX_MlAUNcJKk0WU",
            authDomain: "lucidbyheri.firebaseapp.com",
            projectId: "lucidbyheri",
            storageBucket: "lucidbyheri.firebasestorage.app",
            messagingSenderId: "282347124526",
            appId: "1:282347124526:web:552c724fae9fc433912cbf"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const loginView = document.getElementById('login-view');
        const dashboardView = document.getElementById('dashboard-view');
        const emailInput = document.getElementById('email-input');
        const passwordInput = document.getElementById('password-input');
        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        const logoutBtn = document.getElementById('logout-btn');

        const generateBtn = document.getElementById('generate-btn');
        const searchInput = document.getElementById('search-input');
        const listContainer = document.getElementById('license-list-container');
        
        let allLicenses = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                localStorage.setItem('lucid_admin_auth', 'true');
                loginView.style.display = 'none';
                dashboardView.classList.remove('hidden');
                dashboardView.classList.add('flex');
                loadData();
            } else {
                localStorage.removeItem('lucid_admin_auth');
                dashboardView.classList.add('hidden');
                dashboardView.classList.remove('flex');
                loginView.style.display = 'flex';
                loginView.style.opacity = '1';
            }
        });

        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!email || !password) {
                loginError.textContent = "Please enter email and password";
                loginError.classList.remove('hidden');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing In...';
            loginError.classList.add('hidden');

            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                loginError.textContent = 'Invalid credentials or unauthorized access';
                loginError.classList.remove('hidden');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });

        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('lucid_admin_auth');
            signOut(auth);
        });

        function loadData() {
            if (!auth.currentUser) return;
            
            onSnapshot(collection(db, "licenses"), (snapshot) => {
                allLicenses = [];
                snapshot.forEach((doc) => {
                    allLicenses.push({ id: doc.id, ...doc.data() });
                });
                
                allLicenses.sort((a, b) => {
                    const timeA = a.createdAt ? a.createdAt.toMillis() : 0;
                    const timeB = b.createdAt ? b.createdAt.toMillis() : 0;
                    return timeB - timeA;
                });
                
                renderList();
            });
        }

        function renderList() {
            const query = searchInput.value.toLowerCase();
            const filtered = allLicenses.filter(item => 
                item.id.toLowerCase().includes(query) || 
                (item.name && item.name.toLowerCase().includes(query))
            );

            listContainer.innerHTML = '';

            if (filtered.length === 0) {
                listContainer.innerHTML = `
                    <div class="px-6 py-12 text-center text-gray-500 text-sm">
                        No licenses found.
                    </div>
                `;
                return;
            }

            filtered.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = "flex flex-col p-5 hover:bg-[#1a1a1a] transition-colors gap-3 group";
                
                const statusColor = item.status === 'active' ? 'text-green-400 bg-green-400/10 border-green-400/20' : 'text-red-400 bg-red-400/10 border-red-400/20';
                const statusText = item.status === 'active' ? 'Active' : 'Blocked';
                
                itemDiv.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="font-mono text-white tracking-wider text-sm font-semibold">${item.id}</span>
                        <div class="flex items-center gap-3">
                            <button onclick="window.toggleStatus('${item.id}', '${item.status}')" class="px-3 py-1 rounded-full text-[10px] uppercase tracking-wider font-bold border ${statusColor} active:scale-95 transition-all">
                                ${statusText}
                            </button>
                            <button onclick="window.deleteLicense('${item.id}')" class="text-gray-500 hover:text-red-400 p-1 rounded-lg hover:bg-red-400/10 transition-colors">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div>
                        <input type="text" value="${item.name || ''}" placeholder="Owner name..." onchange="window.updateName('${item.id}', this.value)" class="w-full bg-transparent border-b border-[#333333] focus:border-white py-1.5 text-sm text-gray-300 placeholder-gray-600 transition-colors">
                    </div>
                `;
                listContainer.appendChild(itemDiv);
            });
        }

        searchInput.addEventListener('input', renderList);

        generateBtn.addEventListener('click', async () => {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for(let i=0; i<12; i++) {
                if(i>0 && i%4===0) code += '-';
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            try {
                await setDoc(doc(db, "licenses", code), {
                    name: "",
                    status: "active",
                    createdAt: serverTimestamp()
                });
            } catch (e) {}
        });

        window.toggleStatus = async (id, currentStatus) => {
            const newStatus = currentStatus === 'active' ? 'blocked' : 'active';
            try {
                await updateDoc(doc(db, "licenses", id), {
                    status: newStatus
                });
            } catch (e) {}
        };

        window.deleteLicense = async (id) => {
            if (confirm(`Remove license ${id} permanently?`)) {
                try {
                    await deleteDoc(doc(db, "licenses", id));
                } catch (e) {}
            }
        };

        window.updateName = async (id, newName) => {
            try {
                await updateDoc(doc(db, "licenses", id), {
                    name: newName.trim()
                });
            } catch (e) {}
        };
    </script>
</body>
</html>
